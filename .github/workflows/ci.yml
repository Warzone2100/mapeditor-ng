name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    strategy:
      matrix:
        include:
          - name: Windows-x64
            os: windows-latest
            rust_target: 'x86_64-pc-windows-gnu'
          - name: macOS
            os: macos-latest
            rust_target: 'aarch64-apple-darwin'
          - name: Linux-x64
            os: ubuntu-latest
            rust_target: 'x86_64-unknown-linux-musl'
      fail-fast: false

    name: '${{ matrix.name }}'
    runs-on: '${{ matrix.os }}'

    env:
      RUSTTARGET: '${{ matrix.rust_target }}'

    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
    - name: Prepare Rust toolchain
      shell: bash
      run: |
        echo $RUSTTARGET
        rustup target add "$RUSTTARGET" >&2
    - name: Build
      run: cargo build --verbose
    #- name: Run tests
    #  run: cargo test --verbose
