name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    strategy:
      matrix:
        include:
          - name: Windows-x64
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: Linux-x64
            os: ubuntu-latest

    name: '${{ matrix.name }}'
    runs-on: '${{ matrix.os }}'

    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
    - name: Build
      run: cargo build --verbose
    #- name: Run tests
    #  run: cargo test --verbose
